<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MeasureMate logo</title>
<style>
  @page { size: 297mm 210mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .page {
    width: 297mm; height: 210mm;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    page-break-after: always; position: relative;
  }
  .page:last-child { page-break-after: auto; }
  .lockup { display: flex; align-items: center; gap: 14mm; }
  .lockup svg { width: 52mm; height: 52mm; }
  .wordmark { font-size: 30mm; font-weight: 800; letter-spacing: -0.02em; color: #28241f; }
  .reversed { background: #0f766e; }
  .reversed .wordmark { color: #ffffff; }
  .mark-only svg { width: 110mm; height: 110mm; }
  .caption {
    position: absolute; bottom: 12mm; width: 100%;
    text-align: center; font-size: 4.2mm; color: #6f675d; letter-spacing: 0.04em;
  }
  .reversed .caption { color: rgba(255, 255, 255, 0.75); }
</style>
</head>
<body>

  <!-- Page 1: primary horizontal lockup -->
  <div class="page">
    <div class="lockup">
      <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" rx="112" fill="#0f766e"/>
        <g fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 132 196 H 380"/>
          <path d="M 320 136 L 380 196 L 320 256"/>
          <path d="M 380 316 H 132"/>
          <path d="M 192 256 L 132 316 L 192 376"/>
        </g>
      </svg>
      <div class="wordmark">MeasureMate</div>
    </div>
    <div class="caption">MeasureMate &nbsp;·&nbsp; measurem8.app &nbsp;·&nbsp; Teal #0F766E &nbsp;·&nbsp; Ink #28241F</div>
  </div>

  <!-- Page 2: icon mark only -->
  <div class="page mark-only">
    <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <rect width="512" height="512" rx="112" fill="#0f766e"/>
      <g fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 132 196 H 380"/>
        <path d="M 320 136 L 380 196 L 320 256"/>
        <path d="M 380 316 H 132"/>
        <path d="M 192 256 L 132 316 L 192 376"/>
      </g>
    </svg>
    <div class="caption">Icon mark &nbsp;·&nbsp; rounded square 512×512, corner radius 112 &nbsp;·&nbsp; Teal #0F766E</div>
  </div>

  <!-- Page 3: reversed lockup on teal -->
  <div class="page reversed">
    <div class="lockup">
      <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" rx="112" fill="#ffffff"/>
        <g fill="none" stroke="#0f766e" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 132 196 H 380"/>
          <path d="M 320 136 L 380 196 L 320 256"/>
          <path d="M 380 316 H 132"/>
          <path d="M 192 256 L 132 316 L 192 376"/>
        </g>
      </svg>
      <div class="wordmark">MeasureMate</div>
    </div>
    <div class="caption">Reversed lockup — for use on teal or dark backgrounds</div>
  </div>

</body>
</html>
